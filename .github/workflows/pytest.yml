# pytests

name: pytest

on:
  push:
  pull_request:

defaults:
  run:
      shell: bash -l {0}

jobs:
  run_pytests:
    runs-on: ubuntu-latest
    env:
      MINIFORGE_ROOT: ${{ github.workspace }}/.miniforge
      MINIFORGE_CACHE: ${{ github.workspace }}/.cache/miniforge
      CONDA_PKGS_DIRS: ${{ github.workspace }}/.cache/conda/pkgs
    steps:
      - uses: actions/checkout@v5
      - name: Install Miniforge and create env
        run: |
          set -euo pipefail
          MINIFORGE_ROOT="$GITHUB_WORKSPACE/.miniforge"
          MINIFORGE_CACHE="$GITHUB_WORKSPACE/.cache/miniforge"
          CONDA_PKGS_DIRS="$GITHUB_WORKSPACE/.cache/conda/pkgs"
          mkdir -p "$MINIFORGE_CACHE" "$CONDA_PKGS_DIRS"

          MINIFORGE_SH=Miniforge3-Linux-x86_64.sh
          MINIFORGE_URL=https://github.com/conda-forge/miniforge/releases/latest/download/${MINIFORGE_SH}
          if [ ! -f "$MINIFORGE_CACHE/${MINIFORGE_SH}" ]; then
            curl -L "$MINIFORGE_URL" -o "$MINIFORGE_CACHE/${MINIFORGE_SH}"
          fi

          if [ ! -x "$MINIFORGE_ROOT/bin/conda" ]; then
            bash "$MINIFORGE_CACHE/${MINIFORGE_SH}" -b -p "$MINIFORGE_ROOT"
          fi

          export PATH="$MINIFORGE_ROOT/bin:$PATH"
          export CONDA_PKGS_DIRS="$CONDA_PKGS_DIRS"
          export MAMBA_ROOT_PREFIX="$MINIFORGE_ROOT"
          conda config --set channel_priority strict
          conda config --set remote_max_retries 5
          conda config --set remote_backoff_factor 1
          conda config --set remote_connect_timeout_secs 20
          conda config --set remote_read_timeout_secs 60
          conda config --add channels conda-forge
          conda config --add channels bioconda
          if [ ! -x "$MINIFORGE_ROOT/bin/micromamba" ]; then
            conda install -y -c conda-forge micromamba
          fi
          if [ ! -d "$MINIFORGE_ROOT/envs/dissectBCL" ]; then
            CREATE_CMD=(micromamba create -y --root-prefix "$MINIFORGE_ROOT" -f env.yml -n dissectBCL)
          else
            CREATE_CMD=(micromamba env update -y --root-prefix "$MINIFORGE_ROOT" -f env.yml -n dissectBCL)
          fi
          attempts=0
          until [ "$attempts" -ge 3 ]; do
            if "${CREATE_CMD[@]}"; then
              break
            fi
            attempts=$((attempts+1))
            echo "Micromamba env create/update failed; retry $attempts/3"
            conda clean --lock || true
            sleep 10
          done
          if [ "$attempts" -ge 3 ]; then
            echo "Failed to create/update env with micromamba after 3 attempts"
            exit 1
          fi
      - name: pip
        run: |
          set -euo pipefail
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python -m pip install ".[dev]"
      - name: verify generated version file
        run: |
          set -euo pipefail
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python -m pip install --upgrade setuptools_scm
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python - <<'PY'
          from pathlib import Path
          from setuptools_scm import get_version

          expected = f"__version__ = {get_version()!r}\n"
          path = Path('src/dissectBCL/_version.py')
          actual = path.read_text()
          if actual != expected:
              raise SystemExit(
                  f"src/dissectBCL/_version.py is stale\nexpected: {expected!r}\nactual:   {actual!r}"
              )
          PY
      - name: pytest
        run: |
          set -euo pipefail
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL pytest
      - name: build source distribution and wheel
        run: |
          set -euo pipefail
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python -m pip install --upgrade build
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python -m build --sdist --wheel
      - name: verify install from source distribution
        run: |
          set -euo pipefail
          "$MINIFORGE_ROOT/bin/micromamba" run -n dissectBCL python -m venv .venv-package
          . .venv-package/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/dissectbcl-*.tar.gz
          python -c "import dissectBCL; print(dissectBCL.__name__)"