# pytests

name: pytest

on:
  push:
  pull_request:

defaults:
  run:
      shell: bash -l {0}

jobs:
  run_pytests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: conda-incubator/setup-miniconda@v3
        with:
          channels: conda-forge,bioconda
          channel-priority: true
          environment-file: env.yml
          cache-downloads: true
          activate-environment: dissectBCL
          conda-remove-defaults: true
      - name: pip
        run: |
          pip install .[dev]
      - name: pytest
        run: |
          pytest
      - name: build source distribution and wheel
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --wheel
      - name: verify install from source distribution
        run: |
          python -m venv .venv-package
          . .venv-package/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/dissectbcl-*.tar.gz
          python -c "import dissectBCL; print(dissectBCL.__name__)"